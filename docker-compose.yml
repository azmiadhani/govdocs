services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: govdocs
      POSTGRES_USER: govdocs
      POSTGRES_PASSWORD: govdocs_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file: .env
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
